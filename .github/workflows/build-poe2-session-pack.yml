name: Build PoE2 Session Pack

on:
  workflow_dispatch:
    inputs:
      focus:
        description: "Short name for this session pack, e.g. Echo, Chronomancer, New Druid"
        required: true
        default: "Echo"
        type: string
      keywords:
        description: "Comma-separated search terms, e.g. monk,cold,freeze,glacial,power charge,quarterstaff"
        required: true
        default: "monk,cold,freeze,glacial,power charge,quarterstaff"
        type: string
      max_per_index:
        description: "Max matched records per index"
        required: true
        default: "80"
        type: string
      include_raw_excerpts:
        description: "Include compact raw JSON snippets in the pack"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build-session-pack:
    name: Build session pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build focused PoE2 session pack
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import re
          from pathlib import Path
          from typing import Any

          FOCUS = """${{ github.event.inputs.focus }}""".strip() or "PoE2"
          KEYWORDS_RAW = """${{ github.event.inputs.keywords }}""".strip()
          MAX_PER_INDEX_RAW = """${{ github.event.inputs.max_per_index }}""".strip()
          INCLUDE_RAW = """${{ github.event.inputs.include_raw_excerpts }}""".strip().lower() == "true"

          try:
              MAX_PER_INDEX = max(10, min(250, int(MAX_PER_INDEX_RAW)))
          except Exception:
              MAX_PER_INDEX = 80

          ROOT = Path(".")
          COMPACT = ROOT / "build_knowledge" / "compact"
          OUT_DIR = ROOT / "session_packs"
          OUT_DIR.mkdir(parents=True, exist_ok=True)

          keyword_list = [k.strip().lower() for k in KEYWORDS_RAW.split(",") if k.strip()]
          if not keyword_list:
              keyword_list = ["cold", "monk"]

          def slugify(text: str) -> str:
              text = text.lower()
              text = re.sub(r"[^a-z0-9]+", "-", text)
              return text.strip("-") or "poe2"

          def load_json(path: Path) -> Any:
              if not path.exists():
                  return None
              return json.loads(path.read_text(encoding="utf-8"))

          def as_items(data: Any):
              if isinstance(data, list):
                  return enumerate(data)
              if isinstance(data, dict):
                  return data.items()
              return []

          def text_for_match(obj: Any) -> str:
              return json.dumps(obj, ensure_ascii=False).lower()

          def name_of(obj: Any, fallback: str = "") -> str:
              if isinstance(obj, dict):
                  for key in ("n", "name", "Name", "display_name", "k", "id", "key"):
                      value = obj.get(key)
                      if isinstance(value, str) and value.strip():
                          return value.strip()
              return fallback

          def score_record(obj: Any) -> int:
              text = text_for_match(obj)
              score = 0
              for kw in keyword_list:
                  if kw in text:
                      score += 10
              if isinstance(obj, dict):
                  n = str(obj.get("n") or obj.get("name") or obj.get("k") or "").lower()
                  for kw in keyword_list:
                      if kw in n:
                          score += 20
              return score

          def trim_value(value: Any, max_chars: int = 900) -> str:
              raw = json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              if len(raw) > max_chars:
                  return raw[:max_chars] + "...[trimmed]"
              return raw

          INDEXES = [
              ("Passive key nodes", COMPACT / "passive_tree_key_nodes.json"),
              ("Passive full compact", COMPACT / "passive_tree_full_compact.json"),
              ("Passive edges", COMPACT / "passive_tree_edges.json"),
              ("Gems and skills", COMPACT / "gem_index.json"),
              ("Item bases/classes", COMPACT / "item_base_index.json"),
              ("Mods and affixes", COMPACT / "mod_index.json"),
              ("Rune mods", COMPACT / "rune_mod_index.json"),
              ("Uniques", COMPACT / "unique_index.json"),
              ("Misc", COMPACT / "misc_index.json"),
          ]

          now = dt.datetime.now(dt.timezone.utc).isoformat(timespec="seconds")
          lines = []
          lines.append(f"# PoE2 Session Pack — {FOCUS}")
          lines.append("")
          lines.append(f"- Generated UTC: `{now}`")
          lines.append(f"- Focus: `{FOCUS}`")
          lines.append(f"- Keywords: `{', '.join(keyword_list)}`")
          lines.append(f"- Max matched records per index: `{MAX_PER_INDEX}`")
          lines.append("")
          lines.append("## How Claude should use this file")
          lines.append("")
          lines.append("- Treat this session pack as the first-pass lookup result, not the entire database.")
          lines.append("- Use it for the current build/session focus only.")
          lines.append("- If a needed item, gem, passive, mod, rune, or unique is missing from this pack, ask the user to generate a new session pack with broader keywords.")
          lines.append("- Do not invent data that is not in this pack or other connected project files.")
          lines.append("")

          summary_rows = []
          total_matches = 0

          for title, path in INDEXES:
              data = load_json(path)
              if data is None:
                  summary_rows.append((title, "MISSING", 0))
                  continue

              matches = []
              for _, rec in as_items(data):
                  sc = score_record(rec)
                  if sc > 0:
                      matches.append((sc, rec))

              matches.sort(key=lambda x: (-x[0], name_of(x[1]).lower()))
              clipped = matches[:MAX_PER_INDEX]
              total_matches += len(clipped)
              summary_rows.append((title, "OK", len(clipped)))

              lines.append(f"## {title}")
              lines.append("")
              lines.append(f"- Source: `{path}`")
              lines.append(f"- Matches included: `{len(clipped)}`")
              lines.append("")

              if not clipped:
                  lines.append("_No keyword matches in this index._")
                  lines.append("")
                  continue

              for i, (score, rec) in enumerate(clipped, 1):
                  name = name_of(rec, f"record-{i}")
                  lines.append(f"### {i}. {name}")
                  lines.append("")
                  lines.append(f"- Match score: `{score}`")
                  if isinstance(rec, dict):
                      for field in ("id", "k", "n", "t", "cat", "src", "asc", "sd", "desc", "stat_text", "tags", "gem_tags", "types", "classes", "base", "weapons", "req", "lvl", "support", "is_support", "gen", "domain"):
                          if field in rec and rec[field] not in (None, "", [], {}):
                              value = rec[field]
                              if isinstance(value, (dict, list)):
                                  value_str = json.dumps(value, ensure_ascii=False, separators=(",", ":"))
                              else:
                                  value_str = str(value)
                              if len(value_str) > 500:
                                  value_str = value_str[:500] + "...[trimmed]"
                              lines.append(f"- `{field}`: {value_str}")
                  if INCLUDE_RAW:
                      lines.append("")
                      lines.append("```json")
                      lines.append(trim_value(rec))
                      lines.append("```")
                  lines.append("")

          lines.insert(6, f"- Total included matches: `{total_matches}`")
          lines.insert(7, "")

          lines.append("## Index match summary")
          lines.append("")
          lines.append("| Index | Status | Included matches |")
          lines.append("|---|---|---:|")
          for title, status, count in summary_rows:
              lines.append(f"| {title} | {status} | {count} |")
          lines.append("")

          latest = OUT_DIR / "latest_session_pack.md"
          slug = slugify(FOCUS)
          timestamp = dt.datetime.now(dt.timezone.utc).strftime("%Y%m%d-%H%M%S")
          archive = OUT_DIR / f"{timestamp}-{slug}.md"

          text = "\n".join(lines)
          latest.write_text(text, encoding="utf-8")
          archive.write_text(text, encoding="utf-8")

          print(f"Wrote {latest}")
          print(f"Wrote {archive}")
          print(f"Total matches: {total_matches}")
          PY

      - name: Commit session pack
        shell: bash
        run: |
          git config user.name "poe2-data-bot"
          git config user.email "actions@github.com"

          git add session_packs

          if git diff --cached --quiet; then
            echo "No session pack changes to commit"
          else
            git commit -m "Build PoE2 session pack"
            git push
          fi

      - name: Upload session pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: poe2_session_pack
          path: session_packs/latest_session_pack.md
