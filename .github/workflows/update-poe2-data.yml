name: Update PoE2 Data Bundle

on:
workflow_dispatch:
schedule:
- cron: "17 10 * * *"

permissions:
contents: write

jobs:
update-data:
runs-on: ubuntu-latest

```
steps:
  - name: Check out repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Download PoE2 data and build Claude indexes
    run: |
      python - <<'PY'
      import datetime as dt
      import json
      import urllib.request
      import zipfile
      from pathlib import Path

      ROOT = Path(".")
      SOURCES = ROOT / "sources"
      BUILD = ROOT / "build_knowledge"
      ZIP = ROOT / "poe2_data_bundle.zip"

      URLS = {
          "ggg": {
              "passive_tree_data.json": "https://raw.githubusercontent.com/grindinggear/poe2-skilltree-export/main/data.json"
          },
          "repoe_poe2": {
              "skill_gems.json": "https://repoe-fork.github.io/poe2/skill_gems.json",
              "skills.json": "https://repoe-fork.github.io/poe2/skills.json",
              "gem_tags.json": "https://repoe-fork.github.io/poe2/gem_tags.json",
              "active_skill_types.json": "https://repoe-fork.github.io/poe2/active_skill_types.json",
              "cost_types.json": "https://repoe-fork.github.io/poe2/cost_types.json",
              "keywords.json": "https://repoe-fork.github.io/poe2/keywords.json",
              "base_items.json": "https://repoe-fork.github.io/poe2/base_items.json",
              "item_classes.json": "https://repoe-fork.github.io/poe2/item_classes.json",
              "tags.json": "https://repoe-fork.github.io/poe2/tags.json",
              "tag_details.json": "https://repoe-fork.github.io/poe2/tag_details.json",
              "mods.json": "https://repoe-fork.github.io/poe2/mods.json",
              "mods_by_base.json": "https://repoe-fork.github.io/poe2/mods_by_base.json",
              "characters.json": "https://repoe-fork.github.io/poe2/characters.json",
              "ascendancies.json": "https://repoe-fork.github.io/poe2/ascendancies.json",
              "uniques.json": "https://repoe-fork.github.io/poe2/uniques.json",
              "stats_by_file.json": "https://repoe-fork.github.io/poe2/stats_by_file.json",
              "stat_value_handlers.json": "https://repoe-fork.github.io/poe2/stat_value_handlers.json"
          },
          "pob_data_poe2": {
              "Gems.json": "https://repoe-fork.github.io/pob-data/poe2/Gems.json",
              "ModItem.json": "https://repoe-fork.github.io/pob-data/poe2/ModItem.json",
              "ModRunes.json": "https://repoe-fork.github.io/pob-data/poe2/ModRunes.json",
              "ModJewel.json": "https://repoe-fork.github.io/pob-data/poe2/ModJewel.json",
              "ModCharm.json": "https://repoe-fork.github.io/pob-data/poe2/ModCharm.json",
              "ModFlask.json": "https://repoe-fork.github.io/pob-data/poe2/ModFlask.json",
              "QueryMods.json": "https://repoe-fork.github.io/pob-data/poe2/QueryMods.json",
              "SkillStatMap.json": "https://repoe-fork.github.io/pob-data/poe2/SkillStatMap.json",
              "TradeSiteStats.json": "https://repoe-fork.github.io/pob-data/poe2/TradeSiteStats.json",
              "Costs.json": "https://repoe-fork.github.io/pob-data/poe2/Costs.json",
              "Misc.json": "https://repoe-fork.github.io/pob-data/poe2/Misc.json",
              "Minions.json": "https://repoe-fork.github.io/pob-data/poe2/Minions.json"
          }
      }

      def write_json(path, obj):
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(obj, indent=2, ensure_ascii=False, sort_keys=True), encoding="utf-8")

      def load_json(path):
          return json.loads(path.read_text(encoding="utf-8"))

      def fetch(url, out):
          out.parent.mkdir(parents=True, exist_ok=True)
          req = urllib.request.Request(url, headers={"User-Agent": "poe2-claude-data-hub"})
          with urllib.request.urlopen(req, timeout=90) as r:
              raw = r.read()
          parsed = json.loads(raw.decode("utf-8"))
          out.write_bytes(raw)
          count = len(parsed) if isinstance(parsed, (dict, list)) else 1
          return type(parsed).__name__, count, len(raw)

      def as_list(v):
          if v is None:
              return []
          return v if isinstance(v, list) else [v]

      def name_of(obj, fallback):
          if not isinstance(obj, dict):
              return str(fallback)
          for k in ("name", "Name", "display_name", "DisplayName", "id", "Id"):
              v = obj.get(k)
              if isinstance(v, str) and v.strip():
                  return v.strip()
          return str(fallback)

      def descriptions_of(obj):
          if not isinstance(obj, dict):
              return []
          for k in ("sd", "description", "descriptions", "stat_text", "stats_text"):
              v = obj.get(k)
              if isinstance(v, list):
                  return [str(x) for x in v]
              if isinstance(v, str) and v.strip():
                  return [v.strip()]
          stats = obj.get("stats")
          if isinstance(stats, list):
              return [str(x) for x in stats]
          if isinstance(stats, dict):
              return [f"{k}: {v}" for k, v in stats.items()]
          return []

      def passive_type(node):
          flags = []
          if node.get("isKeystone") or node.get("ks"):
              flags.append("keystone")
          if node.get("isNotable"):
              flags.append("notable")
          if node.get("isJewelSocket"):
              flags.append("jewel_socket")
          if node.get("isRoot") or node.get("isClassStart"):
              flags.append("class_start")
          if node.get("isAscendancyStart"):
              flags.append("ascendancy_start")
          if node.get("ascendancyName"):
              flags.append("ascendancy")
          return ", ".join(flags) if flags else "small_passive_or_travel"

      def simple_index(data, source_file, category):
          rows = []
          items = data.items() if isinstance(data, dict) else enumerate(data) if isinstance(data, list) else []
          for key, value in items:
              if isinstance(value, dict):
                  row = {
                      "key": str(key),
                      "name": name_of(value, key),
                      "category": category,
                      "source_file": source_file,
                  }
                  keep = [
                      "id", "Id", "base_item", "base_item_id", "item_class", "item_classes",
                      "tags", "gem_tags", "active_skill_types", "requirements", "stats",
                      "stat_text", "description", "descriptions", "implicit_mods", "explicit_mods",
                      "mods", "domain", "generation_type", "spawn_weights", "adds_tags",
                      "grants_effects", "skill_id", "skill", "support_gem", "is_support",
                      "allowed_types", "excluded_types"
                  ]
                  for field in keep:
                      if field in value:
                          row[field] = value[field]
                  rows.append(row)
              else:
                  rows.append({
                      "key": str(key),
                      "name": str(value),
                      "category": category,
                      "source_file": source_file,
                      "value": value
                  })
          rows.sort(key=lambda x: (str(x.get("name", "")), str(x.get("key", ""))))
          return rows

      results = []

      for group, files in URLS.items():
          for filename, url in files.items():
              out = SOURCES / group / filename
              try:
                  top_type, count, size = fetch(url, out)
                  results.append({
                      "group": group,
                      "file": filename,
                      "url": url,
                      "ok": True,
                      "details": f"{top_type}, {count} records, {size} bytes"
                  })
                  print(f"OK {group}/{filename}: {count} records")
              except Exception as e:
                  results.append({
                      "group": group,
                      "file": filename,
                      "url": url,
                      "ok": False,
                      "details": str(e)
                  })
                  print(f"FAILED {group}/{filename}: {e}")

      BUILD.mkdir(parents=True, exist_ok=True)

      # Passive tree index
      passive_index = []
      passive_path = SOURCES / "ggg" / "passive_tree_data.json"
      if passive_path.exists():
          data = load_json(passive_path)
          nodes = data.get("nodes", {})
          items = nodes.items() if isinstance(nodes, dict) else enumerate(nodes) if isinstance(nodes, list) else []
          for key, node in items:
              if not isinstance(node, dict):
                  continue
              node_id = str(node.get("skill") or node.get("id") or node.get("nodeId") or node.get("hash") or key)
              passive_index.append({
                  "id": node_id,
                  "name": name_of(node, "(unnamed passive node)"),
                  "type": passive_type(node),
                  "descriptions": descriptions_of(node),
                  "raw_stats": node.get("stats", []),
                  "connections_out": [str(x) for x in as_list(node.get("out"))],
                  "connections_in": [str(x) for x in as_list(node.get("in"))],
                  "group": node.get("g"),
                  "orbit": node.get("o"),
                  "orbit_index": node.get("oidx"),
                  "ascendancy_name": node.get("ascendancyName"),
                  "class_start_index": node.get("spc")
              })
      write_json(BUILD / "passive_tree_index.json", passive_index)

      # Gem index
      gem_index = []
      for rel, cat in [
          ("repoe_poe2/skill_gems.json", "repoe_skill_gems"),
          ("repoe_poe2/skills.json", "repoe_skills"),
          ("repoe_poe2/gem_tags.json", "repoe_gem_tags"),
          ("repoe_poe2/active_skill_types.json", "repoe_active_skill_types"),
          ("pob_data_poe2/Gems.json", "pob_gems"),
          ("pob_data_poe2/SkillStatMap.json", "pob_skill_stat_map")
      ]:
          p = SOURCES / rel
          if p.exists():
              gem_index.extend(simple_index(load_json(p), rel, cat))
      write_json(BUILD / "gem_index.json", gem_index)

      # Item/base index
      item_index = []
      for rel, cat in [
          ("repoe_poe2/base_items.json", "repoe_base_items"),
          ("repoe_poe2/item_classes.json", "repoe_item_classes"),
          ("repoe_poe2/tags.json", "repoe_tags"),
          ("repoe_poe2/tag_details.json", "repoe_tag_details")
      ]:
          p = SOURCES / rel
          if p.exists():
              item_index.extend(simple_index(load_json(p), rel, cat))
      write_json(BUILD / "item_base_index.json", item_index)

      # Mod index
      mod_index = []
      for rel, cat in [
          ("repoe_poe2/mods.json", "repoe_mods"),
          ("repoe_poe2/mods_by_base.json", "repoe_mods_by_base"),
          ("pob_data_poe2/ModItem.json", "pob_mod_item"),
          ("pob_data_poe2/QueryMods.json", "pob_query_mods"),
          ("pob_data_poe2/TradeSiteStats.json", "pob_trade_site_stats")
      ]:
          p = SOURCES / rel
          if p.exists():
              mod_index.extend(simple_index(load_json(p), rel, cat))
      write_json(BUILD / "mod_index.json", mod_index)

      # Rune index
      rune_index = []
      p = SOURCES / "pob_data_poe2/ModRunes.json"
      if p.exists():
          rune_index.extend(simple_index(load_json(p), "pob_data_poe2/ModRunes.json", "pob_mod_runes"))
      write_json(BUILD / "rune_mod_index.json", rune_index)

      # Unique index
      unique_index = []
      p = SOURCES / "repoe_poe2/uniques.json"
      if p.exists():
          unique_index.extend(simple_index(load_json(p), "repoe_poe2/uniques.json", "repoe_uniques"))
      write_json(BUILD / "unique_index.json", unique_index)

      # Misc index
      misc_index = []
      for rel, cat in [
          ("repoe_poe2/characters.json", "repoe_characters"),
          ("repoe_poe2/ascendancies.json", "repoe_ascendancies"),
          ("repoe_poe2/keywords.json", "repoe_keywords"),
          ("repoe_poe2/cost_types.json", "repoe_cost_types"),
          ("pob_data_poe2/Costs.json", "pob_costs"),
          ("pob_data_poe2/Misc.json", "pob_misc"),
          ("pob_data_poe2/Minions.json", "pob_minions"),
          ("pob_data_poe2/ModJewel.json", "pob_mod_jewel"),
          ("pob_data_poe2/ModCharm.json", "pob_mod_charm"),
          ("pob_data_poe2/ModFlask.json", "pob_mod_flask")
      ]:
          p = SOURCES / rel
          if p.exists():
              misc_index.extend(simple_index(load_json(p), rel, cat))
      write_json(BUILD / "misc_index.json", misc_index)

      index_counts = {
          "passive_tree_index.json": len(passive_index),
          "gem_index.json": len(gem_index),
          "item_base_index.json": len(item_index),
          "mod_index.json": len(mod_index),
          "rune_mod_index.json": len(rune_index),
          "unique_index.json": len(unique_index),
          "misc_index.json": len(misc_index),
      }

      now = dt.datetime.now(dt.timezone.utc).isoformat(timespec="seconds")
      lines = []
      lines.append("# PoE2 Data Manifest Summary")
      lines.append("")
      lines.append(f"- Generated UTC: `{now}`")
      lines.append("")
      lines.append("## Download results")
      lines.append("")
      lines.append("| Group | File | Status | Details |")
      lines.append("|---|---|---|---|")
      for r in results:
          status = "✅ OK" if r["ok"] else "❌ FAILED"
          details = str(r["details"]).replace("|", "\\|")
          lines.append(f"| {r['group']} | `{r['file']}` | {status} | {details} |")
      lines.append("")
      lines.append("## Generated indexes")
      lines.append("")
      lines.append("| Index | Records |")
      lines.append("|---|---:|")
      for k, v in sorted(index_counts.items()):
          lines.append(f"| `{k}` | {v:,} |")
      lines.append("")
      lines.append("## Usage rules")
      lines.append("")
      lines.append("- Passive tree claims should use `passive_tree_index.json` or GGG raw passive tree data.")
      lines.append("- Skill/gem claims should use `gem_index.json` and relevant raw RePoE/PoB-data files.")
      lines.append("- Gear/mod/rune/unique claims should use `item_base_index.json`, `mod_index.json`, `rune_mod_index.json`, and `unique_index.json`.")
      lines.append("- If a claim is not supported by these files, label it unverified.")
      (BUILD / "manifest_summary.md").write_text("\n".join(lines), encoding="utf-8")

      if ZIP.exists():
          ZIP.unlink()
      with zipfile.ZipFile(ZIP, "w", compression=zipfile.ZIP_DEFLATED) as z:
          for folder in [SOURCES, BUILD]:
              if folder.exists():
                  for p in folder.rglob("*"):
                      if p.is_file():
                          z.write(p, p)

      print("Generated indexes:")
      for k, v in sorted(index_counts.items()):
          print(f"{k}: {v:,}")
      print(f"ZIP written: {ZIP}")
      PY

  - name: Commit updated data
    run: |
      git config user.name "poe2-data-bot"
      git config user.email "actions@github.com"
      git add sources build_knowledge poe2_data_bundle.zip
      git diff --cached --quiet && echo "No data changes to commit" || git commit -m "Update PoE2 data bundle"
      git push

  - name: Upload ZIP artifact
    uses: actions/upload-artifact@v4
    with:
      name: poe2_data_bundle
      path: poe2_data_bundle.zip
```
