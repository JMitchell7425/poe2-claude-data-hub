name: Update PoE2 Data Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  update-data:
    name: Update data
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download PoE2 data files
        shell: bash
        run: |
          mkdir -p sources/ggg
          mkdir -p sources/repoe_poe2
          mkdir -p sources/pob_data_poe2
          mkdir -p build_knowledge

          SUMMARY="build_knowledge/manifest_summary.md"
          : > "$SUMMARY"

          {
            echo "# PoE2 Data Manifest Summary"
            echo ""
            echo "Generated UTC: $(date -u +"%Y-%m-%d %H:%M:%S")"
            echo ""
            echo "## Download results"
            echo ""
            echo "| Status | File | Source |"
            echo "|---|---|---|"
          } >> "$SUMMARY"

          download_file () {
            local url="$1"
            local out="$2"

            echo "Downloading: $out"
            if curl -L --fail --retry 3 --retry-delay 2 -o "$out" "$url"; then
              echo "| OK | \`$out\` | $url |" >> "$SUMMARY"
              return 0
            else
              echo "| FAILED | \`$out\` | $url |" >> "$SUMMARY"
              rm -f "$out"
              return 0
            fi
          }

          # GGG passive tree
          download_file "https://raw.githubusercontent.com/grindinggear/poe2-skilltree-export/main/data.json" "sources/ggg/passive_tree_data.json"

          # RePoE PoE2 core data
          download_file "https://repoe-fork.github.io/poe2/skill_gems.json" "sources/repoe_poe2/skill_gems.json"
          download_file "https://repoe-fork.github.io/poe2/skills.json" "sources/repoe_poe2/skills.json"
          download_file "https://repoe-fork.github.io/poe2/gem_tags.json" "sources/repoe_poe2/gem_tags.json"
          download_file "https://repoe-fork.github.io/poe2/active_skill_types.json" "sources/repoe_poe2/active_skill_types.json"
          download_file "https://repoe-fork.github.io/poe2/cost_types.json" "sources/repoe_poe2/cost_types.json"
          download_file "https://repoe-fork.github.io/poe2/keywords.json" "sources/repoe_poe2/keywords.json"
          download_file "https://repoe-fork.github.io/poe2/base_items.json" "sources/repoe_poe2/base_items.json"
          download_file "https://repoe-fork.github.io/poe2/item_classes.json" "sources/repoe_poe2/item_classes.json"
          download_file "https://repoe-fork.github.io/poe2/tags.json" "sources/repoe_poe2/tags.json"
          download_file "https://repoe-fork.github.io/poe2/tag_details.json" "sources/repoe_poe2/tag_details.json"
          download_file "https://repoe-fork.github.io/poe2/mods.json" "sources/repoe_poe2/mods.json"
          download_file "https://repoe-fork.github.io/poe2/mods_by_base.json" "sources/repoe_poe2/mods_by_base.json"
          download_file "https://repoe-fork.github.io/poe2/characters.json" "sources/repoe_poe2/characters.json"
          download_file "https://repoe-fork.github.io/poe2/ascendancies.json" "sources/repoe_poe2/ascendancies.json"
          download_file "https://repoe-fork.github.io/poe2/uniques.json" "sources/repoe_poe2/uniques.json"
          download_file "https://repoe-fork.github.io/poe2/stats_by_file.json" "sources/repoe_poe2/stats_by_file.json"
          download_file "https://repoe-fork.github.io/poe2/stat_value_handlers.json" "sources/repoe_poe2/stat_value_handlers.json"

          # PoB-data PoE2
          download_file "https://repoe-fork.github.io/pob-data/poe2/Gems.json" "sources/pob_data_poe2/Gems.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/ModItem.json" "sources/pob_data_poe2/ModItem.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/ModRunes.json" "sources/pob_data_poe2/ModRunes.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/ModJewel.json" "sources/pob_data_poe2/ModJewel.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/ModCharm.json" "sources/pob_data_poe2/ModCharm.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/ModFlask.json" "sources/pob_data_poe2/ModFlask.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/QueryMods.json" "sources/pob_data_poe2/QueryMods.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/SkillStatMap.json" "sources/pob_data_poe2/SkillStatMap.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/TradeSiteStats.json" "sources/pob_data_poe2/TradeSiteStats.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/Costs.json" "sources/pob_data_poe2/Costs.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/Misc.json" "sources/pob_data_poe2/Misc.json"
          download_file "https://repoe-fork.github.io/pob-data/poe2/Minions.json" "sources/pob_data_poe2/Minions.json"

          {
            echo ""
            echo "## Downloaded files"
            echo ""
            find sources -type f | sort
            echo ""
            echo "## Usage"
            echo ""
            echo "Raw source files are under \`sources/\`."
            echo "Generated compact indexes are not built by this starter workflow yet."
            echo "Claude should use these raw files as source data until compact indexes are added."
          } >> "$SUMMARY"

          zip -r poe2_data_bundle.zip sources build_knowledge

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "poe2-data-bot"
          git config user.email "actions@github.com"

          git add sources build_knowledge poe2_data_bundle.zip

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update PoE2 data bundle"
            git push
          fi

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: poe2_data_bundle
          path: poe2_data_bundle.zip
